name: npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true

permissions:
  contents: read
  id-token: write

env:
  NPM_PACKAGE_NAME: "@stescobedo9205/azdash"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref }}

      - name: Resolve release metadata
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version || github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+([.][0-9]+){0,3}([-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "Invalid version: ${VERSION}" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Stop when npm token is missing
        if: env.NPM_TOKEN == ''
        run: |
          echo "NPM_TOKEN is required to publish ${NPM_PACKAGE_NAME}." >&2
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Render npm package
        shell: bash
        run: |
          rm -rf npm-package
          mkdir -p npm-package/bin npm-package/scripts
          cp README.md LICENSE npm-package/
          cat > npm-package/package.json <<JSON
          {
            "name": "${NPM_PACKAGE_NAME}",
            "version": "${VERSION}",
            "description": "Azure cost, trend, and waste diagnostics CLI.",
            "license": "MIT",
            "homepage": "https://github.com/${GITHUB_REPOSITORY}",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/${GITHUB_REPOSITORY}.git"
            },
            "bin": {
              "azdash": "bin/azdash.js"
            },
            "scripts": {
              "postinstall": "node scripts/install.js"
            },
            "os": [
              "darwin",
              "linux",
              "win32"
            ],
            "cpu": [
              "x64",
              "arm64"
            ],
            "files": [
              "bin",
              "scripts",
              "README.md",
              "LICENSE"
            ]
          }
          JSON
          cat > npm-package/bin/azdash.js <<'JS'
          #!/usr/bin/env node
          const { spawnSync } = require("node:child_process");
          const path = require("node:path");

          const executable = process.platform === "win32" ? "azdash.exe" : "azdash";
          const binary = path.join(__dirname, "..", "vendor", "bin", executable);
          const result = spawnSync(binary, process.argv.slice(2), { stdio: "inherit" });

          if (result.error) {
            console.error(result.error.message);
            process.exit(1);
          }
          process.exit(result.status ?? 0);
          JS
          chmod +x npm-package/bin/azdash.js
          cat > npm-package/scripts/install.js <<'JS'
          const fs = require("node:fs");
          const https = require("node:https");
          const os = require("node:os");
          const path = require("node:path");
          const { execFileSync } = require("node:child_process");

          const version = require("../package.json").version;
          const platformAssets = {
            darwin: "azdash-macos-latest.tar.gz",
            linux: "azdash-ubuntu-latest.tar.gz",
            win32: "azdash-windows-latest.tar.gz",
          };
          const asset = platformAssets[process.platform];

          if (!asset) {
            throw new Error(`Unsupported platform: ${process.platform}`);
          }
          if (!["x64", "arm64"].includes(process.arch)) {
            throw new Error(`Unsupported architecture: ${process.arch}`);
          }

          const url = `https://github.com/stescobedo92/az-dashboard/releases/download/v${version}/${asset}`;
          const tmp = fs.mkdtempSync(path.join(os.tmpdir(), "azdash-npm-"));
          const archive = path.join(tmp, asset);
          const vendor = path.join(__dirname, "..", "vendor");
          fs.rmSync(vendor, { recursive: true, force: true });
          fs.mkdirSync(vendor, { recursive: true });

          function download(from, to) {
            return new Promise((resolve, reject) => {
              https.get(from, (response) => {
                if ([301, 302, 303, 307, 308].includes(response.statusCode)) {
                  response.resume();
                  download(response.headers.location, to).then(resolve, reject);
                  return;
                }
                if (response.statusCode !== 200) {
                  reject(new Error(`Download failed with HTTP ${response.statusCode}: ${from}`));
                  response.resume();
                  return;
                }
                const file = fs.createWriteStream(to);
                response.pipe(file);
                file.on("finish", () => file.close(resolve));
                file.on("error", reject);
              }).on("error", reject);
            });
          }

          (async () => {
            await download(url, archive);
            execFileSync("tar", ["-xzf", archive, "-C", vendor, "--strip-components=1"], { stdio: "inherit" });
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          JS

      - name: Publish package
        working-directory: npm-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if npm view "${NPM_PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${NPM_PACKAGE_NAME}@${VERSION} is already published."
            exit 0
          fi
          npm publish --access public --provenance
