name: Build, test, and release

on:
  push:
    branches: [master, main, development]
    tags: ['v*']
  pull_request:
    branches: [master, main, development]
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v; requires an existing v<version> tag
        required: true

permissions:
  actions: write
  contents: write

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref }}

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        if: runner.os != 'Windows'
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DAZ_DASHBOARD_BUILD_TESTS=ON

      - name: Configure Windows
        if: runner.os == 'Windows'
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DAZ_DASHBOARD_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Package install tree
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          cmake --install build --config Release --prefix package/azdash
          ARCHIVE="azdash-${{ matrix.os }}.tar.gz"
          tar -czf "${ARCHIVE}" -C package azdash

      - name: Upload release asset candidate
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: azdash-${{ matrix.os }}
          path: azdash-${{ matrix.os }}.tar.gz

  sanitizer:
    name: ubuntu-latest sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref }}

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure
        run: >
          cmake -S . -B build-sanitizer
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DAZ_DASHBOARD_BUILD_TESTS=ON
          -DAZ_DASHBOARD_ENABLE_ASAN=ON
          -DAZ_DASHBOARD_ENABLE_UBSAN=ON

      - name: Build
        run: cmake --build build-sanitizer --config Debug

      - name: Test
        run: ctest --test-dir build-sanitizer --output-on-failure

  release:
    name: Publish GitHub release
    needs: [build-test, sanitizer]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref }}
          fetch-depth: 0

      - name: Resolve release tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION#v}"
            git rev-parse --verify "refs/tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          if [[ ! "${VERSION}" =~ ^[0-9]+([.][0-9]+){0,3}([-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "Invalid version: ${VERSION}" >&2
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "TAG=${TAG}" >> "${GITHUB_ENV}"

      - name: Verify source archive SHA512 for vcpkg
        shell: bash
        run: |
          ARCHIVE_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          curl -fsSL "${ARCHIVE_URL}" -o "stescobedo92-azdash-${VERSION}.tar.gz"
          SHA512="$(sha512sum "stescobedo92-azdash-${VERSION}.tar.gz" | awk '{print $1}')"
          if [[ ! "${SHA512}" =~ ^[0-9a-f]{128}$ ]]; then
            echo "Invalid SHA512 generated: ${SHA512}" >&2
            exit 1
          fi
          {
            echo "tag=${TAG}"
            echo "archive=${ARCHIVE_URL}"
            echo "sha512=${SHA512}"
          } > "stescobedo92-azdash-${VERSION}.sha512.txt"

      - name: Download packaged binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: azdash-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        shell: bash
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-assets/* "stescobedo92-azdash-${VERSION}.sha512.txt" --clobber
          else
            gh release create "${TAG}" release-assets/* "stescobedo92-azdash-${VERSION}.sha512.txt" \
              --title "stescobedo92-azdash ${VERSION}" \
              --notes-file README.md
          fi

      - name: Dispatch vcpkg publish pipeline
        shell: bash
        run: gh workflow run vcpkg-publish.yml --ref "${TAG}" -f version="${VERSION}"
